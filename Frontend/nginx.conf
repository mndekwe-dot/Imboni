# Imboni frontend — serves the React SPA and reverse-proxies the Django API.
# One origin per school subdomain (e.g. school1.localhost) fronts both the SPA
# and the backend so django-tenants' TenantMainMiddleware can route by Host.

# Shared proxy settings for the backend upstream. The Host header MUST be the
# original request host (school1.localhost) so the backend selects the correct
# tenant schema — never rewrite it to the upstream name.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream imboni_backend {
    server backend:8000;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Allow reasonably large uploads (CSV imports, media, etc.)
    client_max_body_size 25m;

    # ---- gzip for static assets --------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/manifest+json
        image/svg+xml
        font/woff2;

    # ---- SPA: client-side routing fallback ---------------------------------
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ---- Backend / API reverse proxy ---------------------------------------
    # django-tenants needs the real Host; forwarded headers keep the client's
    # scheme/IP visible to Django (SECURE_PROXY_SSL_HEADER, logging, throttling).
    location /imboni/ {
        proxy_pass http://imboni_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    location /admin/ {
        proxy_pass http://imboni_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /static/ {
        proxy_pass http://imboni_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /media/ {
        proxy_pass http://imboni_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /__debug__/ {
        proxy_pass http://imboni_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
