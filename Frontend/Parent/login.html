<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Parent Portal Login - Imboni Education Connects</title>
    <link rel="stylesheet" href="../css/globals.css" />
    <link rel="stylesheet" href="../css/parent.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="login-page">
      <div class="login-background">
        <img
          src="../images/login-bg.jpg"
          alt="School Background"
          class="login-bg-image"
          onerror="
            this.style.display = 'none';
            document.querySelector('.login-fallback-bg').style.display =
              'block';
          "
        />
        <div class="login-fallback-bg"></div>
        <div class="login-overlay"></div>
      </div>

      <div class="login-container">
        <div class="login-card">
          <div class="login-logo">
            <img
              src="../images/imboni-logo.png"
              alt="Imboni Logo"
              class="login-logo-img"
            />
          </div>

          <h1 class="login-title">Sign in to your account</h1>
          <p class="login-subtitle">Welcome back! Please enter your details.</p>

          <form class="login-form" action="parent.html" method="GET">
            <div class="form-group">
              <label for="email" class="form-label">Email</label>
              <input
                type="email"
                id="email"
                name="email"
                class="form-input"
                placeholder="Enter your email"
                required
              />
            </div>

            <div class="form-group">
              <label for="password" class="form-label">Password</label>
              <input
                type="password"
                id="password"
                name="password"
                class="form-input"
                placeholder="Enter your password"
                required
              />
            </div>

            <div class="form-options">
              <label class="remember-me">
                <input type="checkbox" name="remember" />
                <span class="checkmark"></span>
                Remember me
              </label>
              <a href="#" class="forgot-password">Forgot password?</a>
            </div>

            <button type="submit" class="login-btn">LOGIN</button>
          </form>

          <div class="login-footer">
            <p>Don't have an account? <a href="#">Contact School</a></p>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
