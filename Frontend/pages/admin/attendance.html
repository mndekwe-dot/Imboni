      rel="stylesheet"

    <style>
      .attendance-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
        gap: 1rem;
      }
      .student-attendance-card {
        padding: 1rem;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        transition: all 0.2s;
      }
      .student-attendance-card:hover {
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      }
      .student-info {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        margin-bottom: 1rem;
      }
      .student-avatar {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: var(--primary);
        color: white;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 600;
      }
      .student-name {
        font-weight: 500;
        color: var(--foreground);
      }
      .student-id {
        font-size: 0.75rem;
        color: var(--muted-foreground);
      }
      .attendance-buttons {
        display: flex;
        gap: 0.5rem;
      }
      .attendance-btn {
        flex: 1;
        padding: 0.5rem;
        border-radius: 0.375rem;
        border: 1px solid var(--border);
        background: white;
        cursor: pointer;
        font-size: 0.875rem;
        transition: all 0.2s;
      }
      .attendance-btn:hover {
        background: var(--muted);
      }
      .attendance-btn.active {
        border-color: transparent;
        color: white;
      }
      .attendance-btn.present.active {
        background: var(--success);
      }
      .attendance-btn.absent.active {
        background: var(--destructive);
      }
      .attendance-btn.late.active {
        background: var(--warning);
      }
    </style>
  </head>

          </div>

            </select>
            <button class="btn btn-primary">Save Attendance</button>

        <div class="dashboard-content">
          <div class="card">
            <div class="card-header">
              <h3 class="card-title">Students (35)</h3>
              <div style="display: flex; gap: 1rem; align-items: center">
                <span
                  style="font-size: 0.875rem; color: var(--muted-foreground)"

                >

                    >✓ Present: <strong>0</strong></span
                  >
                  <span style="color: var(--destructive)"

                  >

                  >
                </div>
              </div>
            </div>
            <div class="card-content">

                <!-- Students will be rendered here -->

            </div>
          </div>

    <script>
      const students = [
        { id: 1, name: "James Omondi", studentId: "ST2024001" },
        { id: 2, name: "Mary Wanjiku", studentId: "ST2024002" },
        { id: 3, name: "Peter Kamau", studentId: "ST2024003" },
        { id: 4, name: "Grace Achieng", studentId: "ST2024004" },
        { id: 5, name: "David Kipchoge", studentId: "ST2024005" },
        { id: 6, name: "Sarah Muthoni", studentId: "ST2024006" },
        { id: 7, name: "John Kariuki", studentId: "ST2024007" },
        { id: 8, name: "Lucy Njeri", studentId: "ST2024008" },
        { id: 9, name: "Michael Otieno", studentId: "ST2024009" },
        { id: 10, name: "Faith Wambui", studentId: "ST2024010" },
        { id: 11, name: "Daniel Korir", studentId: "ST2024011" },
        { id: 12, name: "Rachel Nyambura", studentId: "ST2024012" },
      ];

      function renderStudents() {
        const grid = document.getElementById("attendanceGrid");
        grid.innerHTML = students
          .map(
            (student) => `
                <div class="student-attendance-card">
                    <div class="student-info">
                        <div class="student-avatar">${student.name
                          .split(" ")
                          .map((n) => n[0])
                          .join("")}</div>
                        <div>
                            <div class="student-name">${student.name}</div>
                            <div class="student-id">${student.studentId}</div>
                        </div>
                    </div>
                    <div class="attendance-buttons">
                        <button class="attendance-btn present" onclick="markAttendance(${student.id}, 'present', this)">Present</button>
                        <button class="attendance-btn absent" onclick="markAttendance(${student.id}, 'absent', this)">Absent</button>
                        <button class="attendance-btn late" onclick="markAttendance(${student.id}, 'late', this)">Late</button>
                    </div>
                </div>
            `,
          )
          .join("");
      }

      function markAttendance(studentId, status, button) {
        const card = button.closest(".student-attendance-card");
        const buttons = card.querySelectorAll(".attendance-btn");
        buttons.forEach((btn) => btn.classList.remove("active"));
        button.classList.add("active");
      }

      renderStudents();
    </script>
