name: CI

on:
  push:
    branches: [main, portal-features]
  pull_request:
    branches: [main]
  # Weekly run catches newly-disclosed CVEs in unchanged dependencies.
  schedule:
    - cron: "0 6 * * 1"   # Mondays 06:00 UTC

jobs:
  backend:
    name: Backend (Django + pytest)
    runs-on: ubuntu-latest

    services:
      postgres:
        # django-tenants requires PostgreSQL (schema-per-tenant); matches the
        # docker-compose stack (postgres:16).
        image: postgres:16
        env:
          POSTGRES_USER: imboni
          POSTGRES_PASSWORD: imboni
          POSTGRES_DB: imboni
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U imboni -d imboni"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    env:
      # settings.py reads these via python-decouple; no real secrets in CI.
      THE_SECRET_KEY: ci-not-a-real-secret-key-for-tests-only-0123456789
      MY_DEBUG: "False"
      ALLOWED_HOSTS: localhost,127.0.0.1,testserver
      DATABASE_NAME: imboni
      DATABASE_USER: imboni
      DATABASE_PASSWORD: imboni
      DATABASE_HOST: 127.0.0.1
      DATABASE_PORT: "5432"
      CELERY_TASK_ALWAYS_EAGER: "True"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install system deps for weasyprint/pycairo
        # pycairo needs libcairo2-dev headers; weasyprint needs pango/gdk-pixbuf/ffi at runtime.
        run: sudo apt-get update && sudo apt-get install -y pkg-config build-essential libcairo2-dev libpango1.0-dev libgdk-pixbuf2.0-dev libffi-dev

      - name: Install Python dependencies
        working-directory: Backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Audit Python dependencies for known CVEs
        working-directory: Backend
        # Fails the build if any installed package has a known vulnerability.
        # Bump the offending pin in requirements.txt to fix. To temporarily
        # accept one with no fix yet, add: --ignore-vuln <ID>  (with a comment).
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt

      - name: Lint (ruff)
        working-directory: Backend
        # Gates on bug-indicating rules only (see ruff.toml); the pre-existing
        # stylistic backlog is tracked there and burned down separately.
        run: |
          pip install ruff
          python -m ruff check .

      - name: Django sanity check
        working-directory: Backend
        run: |
          python -c "import django; print('Django', django.get_version())"
          python manage.py check

      - name: Run migrations check
        working-directory: Backend
        # django-tenants disables plain `migrate`; shared-schema migrations
        # verify the migration graph, and pytest builds the tenant schema itself.
        run: python manage.py migrate_schemas --shared

      - name: Run backend tests
        working-directory: Backend
        # Coverage is a ratchet: measured at 71% on 2026-07-18, gated a few
        # points below so ordinary churn doesn't fail the build. Raise the
        # floor when coverage climbs; never lower it to make a build pass.
        run: python -m pytest -q --create-db --cov=apps --cov-report=term --cov-fail-under=68

  frontend:
    name: Frontend (Vitest)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: Frontend/package-lock.json

      - name: Install dependencies
        working-directory: Frontend
        # npm install (not ci): the lock is generated on Windows and omits some
        # Linux-only optional deps (@emnapi/*), which makes strict `npm ci` fail
        # on the Linux runner. `npm install` resolves those on the fly.
        run: npm install

      - name: Lint (eslint)
        working-directory: Frontend
        # Fails on errors (undefined names, bad hook usage). The pre-existing
        # backlog is configured as warnings in eslint.config.js.
        run: npm run lint

      - name: Audit npm dependencies for known CVEs
        working-directory: Frontend
        # Fails on high/critical advisories. Run `npm audit fix` locally to
        # resolve, or raise the threshold if a finding is triaged as acceptable.
        run: npm audit --audit-level=high

      - name: Run frontend tests
        working-directory: Frontend
        run: npm test

      - name: Build (verifies the production bundle + PWA compile)
        working-directory: Frontend
        run: npm run build

  e2e:
    name: Frontend E2E (Playwright)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: Frontend/package-lock.json

      - name: Install dependencies
        working-directory: Frontend
        # npm install (not ci): the lock is generated on Windows and omits some
        # Linux-only optional deps (@emnapi/*), which makes strict `npm ci` fail
        # on the Linux runner. `npm install` resolves those on the fly.
        run: npm install

      - name: Install Playwright browser
        working-directory: Frontend
        run: npx playwright install --with-deps chromium

      - name: Run Playwright E2E
        working-directory: Frontend
        # Playwright starts the dev server itself (see playwright.config.js).
        run: npm run e2e

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: Frontend/playwright-report/
          retention-days: 7
