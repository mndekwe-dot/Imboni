name: CI

on:
  push:
    branches: [main, portal-features]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (Django + pytest)
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: imboni_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      # settings.py reads these via python-decouple; no real secrets in CI.
      THE_SECRET_KEY: ci-not-a-real-secret-key-for-tests-only-0123456789
      MY_DEBUG: "False"
      ALLOWED_HOSTS: localhost,127.0.0.1,testserver
      DATABASE_NAME: imboni_test
      DATABASE_USER: root
      DATABASE_PASSWORD: root
      CELERY_TASK_ALWAYS_EAGER: "True"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install system deps for mysqlclient
        run: sudo apt-get update && sudo apt-get install -y pkg-config default-libmysqlclient-dev build-essential

      - name: Install Python dependencies
        working-directory: Backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Point Django at the MySQL service host
        working-directory: Backend
        # settings.py hardcodes HOST 127.0.0.1 which matches the mapped service port
        run: python -c "import django; print('Django', django.get_version())"

      - name: Run migrations check
        working-directory: Backend
        run: python manage.py migrate --noinput

      - name: Run backend tests
        working-directory: Backend
        run: python -m pytest -q --create-db

  frontend:
    name: Frontend (Vitest)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: Frontend/package-lock.json

      - name: Install dependencies
        working-directory: Frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: Frontend
        run: npm test

      - name: Build (verifies the production bundle + PWA compile)
        working-directory: Frontend
        run: npm run build
