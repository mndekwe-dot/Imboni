# Ruff configuration for the Imboni backend.
#
# Ratchet strategy: CI gates on the rules that indicate genuine breakage
# (syntax errors, undefined names, redefinitions, unused variables). The
# stylistic backlog that predates linting — unused imports, import placement,
# multi-statement lines — is deliberately NOT selected yet; it is tracked in
# `lint-backlog` below and can be burned down file by file, then promoted here.
#
#   python -m ruff check .                 # the CI gate
#   python -m ruff check . --select ALL    # see everything, including backlog

target-version = "py313"
line-length = 120

exclude = [
    "*/migrations/*",   # generated by Django
    "benv",
    "staticfiles",
]

[lint]
# The gate. Small on purpose — every rule here is "this is probably a bug".
#   E9   syntax / IO errors
#   F63  bad comparisons (e.g. `is` on literals, invalid assert tuples)
#   F7   syntax-ish semantic errors (break outside loop, etc.)
#   F82  undefined names  <- caught a real NameError in invitation SMS
#   F811 redefinition of an unused name (silently shadowed import/def)
#   F841 assigned-but-never-used local (usually a dropped result or typo)
select = ["E9", "F63", "F7", "F82", "F811", "F841"]

# Backlog, intentionally unselected for now (counts as of 2026-07-18):
#   F401  52  unused imports
#   E402  17  imports not at top of file (several are deliberate, inside funcs)
#   E701  13  multiple statements on one line
#   E741   6  ambiguous variable name (`l`)
#   E702   2  semicolon-separated statements
#   E401/E731/F541  1 each
[lint.per-file-ignores]
# Tests legitimately assign values only used for their side effects, and
# fixtures are imported for registration rather than direct use.
"**/test_*.py" = ["F841"]
"**/tests.py" = ["F841"]
"conftest.py" = ["F811"]
