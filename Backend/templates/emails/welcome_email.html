<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body        { font-family: Arial, sans-serif; background: #f4f4f4; margin: 0; padding: 20px; }
        .container  { max-width: 600px; margin: 0 auto; background: white; border-radius: 8px; overflow: hidden; }
        .header     { background: #2e7d32; color: white; padding: 30px; text-align: center; }
        .header h1  { margin: 0; font-size: 24px; }
        .body       { padding: 30px; color: #333; }
        .body p     { line-height: 1.6; }
        .info-box   { background: #f1f8e9; border-left: 4px solid #2e7d32; padding: 16px; margin: 20px 0; }
        .btn        { display: inline-block; background: #2e7d32; color: white; padding: 14px 28px;
                      text-decoration: none; border-radius: 6px; font-size: 16px; margin: 20px 0; }
        .footer     { text-align: center; padding: 20px; color: #999; font-size: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Welcome to Imboni!</h1>
            <p style="margin:8px 0 0; opacity:0.9;">Your account is ready</p>
        </div>
        <div class="body">
            <p>Hello <strong>{{ first_name }}</strong>,</p>
            <p>Your account has been created successfully. Here are your details:</p>
            <div class="info-box">
                <p style="margin:0;"><strong>Username:</strong> {{ username }}</p>
                <p style="margin:8px 0 0;"><strong>Role:</strong> {{ role }}</p>
            </div>
            <p>Click below to log in to your portal:</p>
            <a href="{{ login_link }}" class="btn">Go to My Portal</a>
        </div>
        <div class="footer">
            &copy; Imboni School System. This is an automated message.
        </div>
    </div>
</body>
</html>
